version: 2

sources:
  - name: raw
    description: "Fontes de dados brutas da FinLend no BigQuery"
    tables:
      - name: transactions
        description: "Tabela raw de transações financeiras do gateway de pagamento"
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 6, period: hour}
            error_after: {count: 24, period: hour}
      - name: merchants
        description: "Cadastro de lojistas (merchants) da FinLend"
      - name: settlements
        description: >
          Liquidações financeiras. Cada linha representa um lote de settlement com um array
          de transaction_ids. O UNNEST deste array é tratado exclusivamente na camada intermediate.

models:
  - name: stg_transactions
    description: >
      Transações limpas e tipadas. Responsabilidade exclusiva: cast de tipos e filtro de dados
      de teste. Não contém lógica de negócio nem joins com outras fontes.
      Uma linha por transaction_id.
    columns:
      - name: transaction_id
        description: "Identificador único da transação"
        tests:
          - unique
          - not_null

      - name: merchant_id
        description: "Identificador do lojista responsável pela transação"
        tests:
          - not_null

      - name: customer_id
        description: "Identificador do cliente que realizou a transação"

      - name: amount_cents
        description: "Valor da transação em centavos (INTEGER)"
        tests:
          - not_null

      - name: amount_brl
        description: "Valor da transação em Reais (NUMERIC). Calculado como amount_cents / 100."
        tests:
          - not_null

      - name: status
        description: "Status atual da transação. Transações com status 'test' são removidas nesta camada."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['captured', 'refunded', 'chargeback', 'pending', 'failed', 'cancelled']

      - name: payment_method
        description: "Método de pagamento utilizado na transação"
        tests:
          - not_null

      - name: created_at
        description: "Timestamp de criação da transação (UTC)"
        tests:
          - not_null

      - name: updated_at
        description: "Timestamp da última atualização da transação (UTC)"

      - name: transaction_date
        description: "Data da transação derivada de created_at (DATE, UTC). Fonte única de verdade para data."
        tests:
          - not_null

      - name: metadata
        description: "Dados adicionais da transação em formato JSON"

  - name: stg_merchants
    description: >
      Cadastro limpo de lojistas. Criado para eliminar o acoplamento direto entre marts e
      a fonte raw.merchants. Qualquer renomeação de coluna na fonte impacta apenas este modelo.
      Uma linha por merchant_id.
    columns:
      - name: merchant_id
        description: "Identificador único do lojista (chave primária)"
        tests:
          - unique
          - not_null

      - name: trade_name
        description: "Nome fantasia do lojista"
        tests:
          - not_null

      - name: mcc_code
        description: "Merchant Category Code (ISO 18245) — define a categoria de negócio do lojista"

      - name: created_at
        description: "Timestamp de cadastro do lojista (UTC)"
